name: MediCare CI/CD

on:
  push:
    branches: [ "main" ]

jobs:

  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: mediCare-backend
        run: mvn clean package -DskipTests

      - name: Build Docker backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/medicare-backend ./mediCare-backend

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/medicare-backend


  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mediCare-web
        run: npm install

      - name: Build Angular
        working-directory: mediCare-web
        run: npm run build

      - name: Build Docker frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/medicare-frontend ./mediCare-web

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/medicare-frontend