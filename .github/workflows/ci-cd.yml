name: MediCare CI/CD

on:
  push:
    branches: [ "main" ]

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: mediCare-backend
        run: mvn clean package -DskipTests


  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        working-directory: mediCare-web
        run: npm install

      - name: Build Angular
        working-directory: mediCare-web
        run: npm run build